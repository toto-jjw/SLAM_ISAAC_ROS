%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters — Isaac Sim front stereo camera (left, rectified)
# Resolution: 1920x1200  FPS: 20  Lens: ideal pinhole (zero distortion)
#--------------------------------------------------------------------------------------------

Camera.fx: 957.8115559493878
Camera.fy: 957.8115559493878
Camera.cx: 960.0
Camera.cy: 600.0

Camera.k1: 0.0
Camera.k2: 0.0
Camera.p1: 0.0
Camera.p2: 0.0

Camera.width:  1920
Camera.height: 1200

# Frames per second
Camera.fps: 20.0

# Color order: 0 = BGR, 1 = RGB (ignored for grayscale images)
Camera.RGB: 0

#--------------------------------------------------------------------------------------------
# ORB Extractor
#--------------------------------------------------------------------------------------------

# Number of features extracted per frame
ORBextractor.nFeatures: 1500

# Scale factor between pyramid levels
ORBextractor.scaleFactor: 1.1

# Number of pyramid levels
ORBextractor.nLevels: 8

# FAST corner thresholds.
# iniThFAST is tried first; minThFAST is used if no corners are found.
# Lower these values for low-contrast scenes.
ORBextractor.iniThFAST: 15
ORBextractor.minThFAST: 5

#--------------------------------------------------------------------------------------------
# Pangolin Viewer
#--------------------------------------------------------------------------------------------

Viewer.KeyFrameSize:      0.05
Viewer.KeyFrameLineWidth: 1
Viewer.GraphLineWidth:    1
Viewer.PointSize:         2
Viewer.CameraSize:        0.08
Viewer.CameraLineWidth:   3
Viewer.ViewpointX:        0
Viewer.ViewpointY:       -0.7
Viewer.ViewpointZ:       -1.8
Viewer.ViewpointF:        500
